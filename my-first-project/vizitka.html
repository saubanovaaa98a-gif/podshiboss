<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Альбина Саубанова — Врач косметолог</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-pale: #f5e6c8;
      --gold-deep: #a07830;
      --cream: #fdf6e3;
      --brown-dark: #2c1810;
      --brown-mid: #6b4423;
      --red-lip: #c0392b;
      --card-bg: rgba(255, 252, 242, 0.92);
    }

    html, body {
      min-height: 100%;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #fdf3d0 0%, #f5e6c0 30%, #ecdab0 60%, #f8efd8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
      position: relative;
    }

    /* ── Animated background particles ── */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.6), transparent);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(201,168,76,0.4);
      border-radius: 28px;
      padding: 48px 44px 44px;
      max-width: 480px;
      width: 100%;
      box-shadow:
        0 8px 32px rgba(160,120,48,0.18),
        0 2px 8px rgba(160,120,48,0.12),
        inset 0 1px 0 rgba(255,255,255,0.8);
      text-align: center;
      animation: cardIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* golden corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 60px;
      height: 60px;
      border-color: rgba(201,168,76,0.5);
      border-style: solid;
    }
    .card::before { top: 14px; left: 14px; border-width: 2px 0 0 2px; border-radius: 8px 0 0 0; }
    .card::after  { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; border-radius: 0 0 8px 0; }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      gap: 6px;
    }
    .logo-text {
      font-family: 'Georgia', serif;
      font-size: 17px;
      letter-spacing: 3px;
      color: var(--brown-dark);
      font-weight: 400;
    }
    .logo-lip {
      display: flex;
      align-items: center;
    }

    /* ── Photo ── */
    .photo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 28px;
    }
    .photo-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--gold-light) 0deg,
        var(--gold) 90deg,
        var(--gold-deep) 180deg,
        var(--gold) 270deg,
        var(--gold-light) 360deg
      );
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .photo-ring-inner {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--card-bg);
    }
    .photo {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
    }

    /* ── Name ── */
    .name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #8B5E1A 0%, #c9a84c 35%, #e8c96a 50%, #c9a84c 65%, #8B5E1A 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      filter: drop-shadow(0 2px 8px rgba(201,168,76,0.35));
      line-height: 1.2;
      margin-bottom: 10px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px auto 16px;
      max-width: 280px;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Specialization ── */
    .spec {
      font-size: 14px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--brown-mid);
      margin-bottom: 32px;
      opacity: 0.85;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 30px;
    }
    .social-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 16px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }
    .social-btn:hover {
      background: rgba(201,168,76,0.18);
      border-color: var(--gold);
      transform: translateY(-4px) scale(1.06);
      box-shadow: 0 8px 20px rgba(201,168,76,0.25);
    }
    .social-btn svg {
      width: 26px; height: 26px;
      transition: transform 0.28s ease;
    }
    .social-btn:hover svg { transform: scale(1.15); }
    .social-label {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--brown-mid);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── CTA Button ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 38px;
      background: linear-gradient(135deg, #c9a84c 0%, #e8c96a 50%, #c9a84c 100%);
      background-size: 200% auto;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-shadow: 0 4px 18px rgba(201,168,76,0.4), 0 2px 6px rgba(160,120,48,0.3);
      transition: all 0.3s ease;
      animation: pulse 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
      text-shadow: 0 1px 3px rgba(100,60,0,0.4);
    }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      background-size: 200% 100%;
      background-position: -200% 0;
      transition: background-position 0.6s ease;
    }
    .cta:hover::before { background-position: 200% 0; }
    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(201,168,76,0.55), 0 4px 10px rgba(160,120,48,0.35);
      background-position: right center;
      animation: none;
    }
    .cta:active { transform: translateY(0); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 18px rgba(201,168,76,0.4), 0 2px 6px rgba(160,120,48,0.3); }
      50%       { box-shadow: 0 4px 28px rgba(201,168,76,0.7), 0 2px 10px rgba(160,120,48,0.4); }
    }

    /* ── Footer tag ── */
    .tagline {
      margin-top: 28px;
      font-size: 12px;
      color: var(--gold-deep);
      letter-spacing: 1.5px;
      opacity: 0.7;
      font-style: italic;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 36px; }
      .name { font-size: 26px; }
      .photo-wrap { width: 150px; height: 150px; }
      .cta { padding: 14px 28px; font-size: 13px; }
    }
  </style>
</head>

        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 3;
        p.style.cssText = [
          `width:${size}px`,
          `height:${size}px`,
          `left:${Math.random() * 100}%`,
          `animation-duration:${Math.random() * 12 + 8}s`,
          `animation-delay:${Math.random() * 10}s`,
          `opacity:${Math.random() * 0.5 + 0.1}`
        ].join(';');
        container.appendChild(p);
      }
    })();
  </script>

</body>
